# Security Policy — @backendkit-labs/circuit-breaker v0.2.0
# Generada automaticamente por auditoria de seguridad
# Fecha: 2026-05-15

policy:
  - id: no-expose-circuit-breaker-on-request
    severity: high
    description: >
      El Guard expone la instancia completa de CircuitBreaker en
      request['circuitBreaker']. Cualquier middleware o handler posterior
      puede modificar thresholds, resetear el circuito o ejecutar tareas
      arbitrarias dentro del CB.
    rule: "Ruta: src/nestjs/circuit-breaker.guard.ts, linea ~45"
    fix: >
      Reemplazar la instancia completa por un objeto inmutable con solo
      state/canAttempt. O eliminar la exposicion si no es estrictamente
      necesaria.

  - id: add-concurrency-control
    severity: high
    description: >
      CircuitBreaker.execute() y sus metodos internos (onSuccess, onError,
      record) modifican estado compartido (window[], contadores) sin
      sincronizacion. En Node.js, si multiple execute() estan en vuelo
      concurrentemente (await task() permite que otros microtasks corran),
      hay race conditions en halfOpenCalls, window[], halfOpenSuccesses.
    rule: "Ruta: src/circuit-breaker/circuit-breaker.ts, todo el flujo execute()"
    fix: >
      Agregar un lock simple (ej: async-mutex) que serialice el acceso
      a window[] y los contadores de estado.

  - id: protect-update-config-name
    severity: medium
    description: >
      updateConfig() usa spread merge sin proteger el campo 'name'.
      Aunque TypeScript lo excluye del tipo, en runtime no hay barrera.
      Un name malicioso permite log injection en el monitoring service.
    rule: "Ruta: src/circuit-breaker/circuit-breaker.ts, linea ~89"
    fix: >
      Forzar que name nunca se sobrescriba:
      const merged = { ...this.config, ...partial, name: this.config.name };

  - id: add-timeout-to-interceptor
    severity: medium
    description: >
      El interceptor usa firstValueFrom(next.handle()) sin timeout.
      Si el Observable nunca completa, la Promesa queda colgada
      indefinidamente, el Circuit Breaker nunca registra la llamada,
      y el cliente recibe timeout generico.
    rule: "Ruta: src/nestjs/circuit-breaker.interceptor.ts, linea ~22"
    fix: >
      Agregar race() con timer(30000) o usar firstValueFrom con
      defaultValue. Envolver en try-catch y registar el error
      como infraestructura.

  - id: wrap-onstatechange-in-try-catch
    severity: medium
    description: >
      El callback onStateChange se invoca sin try-catch. Si lanza
      una excepcion, rompe la transicion de estado y propaga el error
      hacia execute(), dejando el CB en estado inconsistente.
    rule: "Ruta: src/circuit-breaker/circuit-breaker.ts, metodo transitionTo()"
    fix: >
      Envolver la invocacion en try-catch y loguear el error sin
      propagarlo.

  - id: sanitize-logged-names
    severity: low
    description: >
      El CircuitBreakerService logea nombres de circuit breakers sin
      sanitizar. Posible log injection si un atacante controla el name.
    rule: "Ruta: src/nestjs/circuit-breaker.service.ts, linea ~52"
    fix: >
      Sanitizar name: name.replace(/[\n\r]/g, '_') antes de loguear.
