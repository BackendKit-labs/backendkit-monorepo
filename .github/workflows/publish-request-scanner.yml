name: Publish request-scanner to GitHub Packages

on:
  push:
    tags:
      - 'request-scanner-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@backendkit-labs'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/request-scanner

      - name: Build
        run: npm run build
        working-directory: packages/request-scanner

      - name: Test
        run: npm run test
        working-directory: packages/request-scanner

      - name: Publish
        run: npm publish
        working-directory: packages/request-scanner
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
