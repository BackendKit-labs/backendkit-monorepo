receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers:   [otlp]
      processors:  [batch]
      exporters:   [otlp/jaeger, debug]

    metrics:
      receivers:   [otlp]
      processors:  [batch]
      exporters:   [prometheusremotewrite, debug]
